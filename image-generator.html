<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Food Generator</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
}

.generator{
    max-width:800px;
    margin:auto;
    padding:20px;
    text-align:center;
}

textarea{
    width:100%;
    height:150px;
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:20px;
}

button{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    background:#ff6600;
    color:white;
    cursor:pointer;
    border-radius:8px;
    font-weight:bold;
}

button:hover{
    background:#ff3300;
}

img{
    margin-top:20px;
    max-width:100%;
    border-radius:10px;
}

</style>

</head>
<body>

<div class="generator">

    <h1>🍔 AI Food Generator</h1>

    <textarea id="prompt" placeholder="Example: A spicy zinger burger with cheese and sauce"></textarea>

    <br>

    <button id="generateBtn">Generate Image</button>

    <div id="result"></div>

</div>

<script>
document.getElementById("generateBtn").addEventListener("click", function(){

    let prompt = document.getElementById("prompt").value;

    if(!prompt){
        alert("Please write a prompt first!");
        return;
    }

    let imageUrl = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);

    document.getElementById("result").innerHTML = `
        <p>Generating...</p>
        <img src="${imageUrl}" />
        <br>
        <a href="${imageUrl}" download>
            <button>Download Image</button>
        </a>
    `;
});
</script>

</body>
</html>
